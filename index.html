<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Packliste Mallorca</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f0f0f;
    --surface:#1a1a1a;
    --surface2:#222;
    --border:#2a2a2a;
    --text:#f0f0f0;
    --muted:#666;
    --accent:#1D9E75;
    --accent-dim:#0f5c43;
    --danger:#c0392b;
    --font:'DM Sans',sans-serif;
  }
  html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
  body{padding:0 0 5rem}

  header{
    position:sticky;top:0;z-index:50;
    background:var(--bg);
    border-bottom:1px solid var(--border);
    padding:1rem 1.25rem 0.75rem;
  }
  .header-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:0.5rem}
  h1{font-size:22px;font-weight:700;letter-spacing:-0.02em}
  .dest-badge{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);padding:3px 8px;border-radius:4px}
  .progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s ease}
  .progress-label{font-size:11px;color:var(--muted);margin-top:4px;text-align:right}

  .persons-header{
    display:grid;grid-template-columns:1fr repeat(4,44px);
    gap:4px;align-items:center;
    padding:0.75rem 1.25rem 0.5rem;
    font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;
    color:var(--muted);
    border-bottom:1px solid var(--border);
    position:sticky;top:72px;z-index:40;
    background:var(--bg);
  }
  .person-col{text-align:center}

  .item-row{
    display:grid;grid-template-columns:1fr repeat(4,44px) 32px;
    gap:4px;align-items:center;
    padding:0.7rem 1.25rem;
    border-bottom:1px solid var(--border);
    transition:background 0.2s;
  }
  .item-row.all-done{background:rgba(29,158,117,0.07)}
  .item-row.custom-row{background:rgba(255,255,255,0.02)}
  .item-name{
    font-size:14px;color:var(--text);
    display:flex;align-items:center;gap:6px;
    line-height:1.3;
  }
  .item-name.done{color:var(--muted);text-decoration:line-through}
  .count-badge{
    font-size:10px;font-weight:600;
    color:var(--accent);background:var(--accent-dim);
    padding:1px 5px;border-radius:3px;
    flex-shrink:0;
  }
  .cb-wrap{display:flex;justify-content:center;align-items:center}
  .cb-wrap input[type=checkbox]{
    width:20px;height:20px;cursor:pointer;
    accent-color:var(--accent);
    border-radius:4px;
  }
  .del-btn{
    display:flex;justify-content:center;align-items:center;
    background:none;border:none;cursor:pointer;
    color:var(--muted);font-size:16px;padding:0;
    line-height:1;transition:color 0.15s;
  }
  .del-btn:hover{color:var(--danger)}
  .del-btn-placeholder{width:32px}

  .add-section{
    padding:1rem 1.25rem;
    border-top:1px solid var(--border);
    margin-top:0.25rem;
  }
  .add-row{display:flex;gap:8px;align-items:center}
  .add-input{
    flex:1;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text);
    font-family:var(--font);
    font-size:14px;
    padding:9px 12px;
    border-radius:8px;
    outline:none;
    transition:border-color 0.2s;
  }
  .add-input:focus{border-color:var(--accent)}
  .add-input::placeholder{color:var(--muted)}
  .add-btn{
    background:var(--accent);
    color:#fff;
    border:none;
    font-family:var(--font);
    font-size:14px;font-weight:600;
    padding:9px 16px;
    border-radius:8px;
    cursor:pointer;
    white-space:nowrap;
    transition:opacity 0.15s;
  }
  .add-btn:hover{opacity:0.85}

  .footer-actions{
    padding:0.75rem 1.25rem;
    display:flex;justify-content:flex-end;
  }
  .reset-btn{
    font-size:12px;color:var(--muted);
    background:none;border:1px solid var(--border);
    font-family:var(--font);
    padding:6px 14px;border-radius:6px;cursor:pointer;
    transition:color 0.15s,border-color 0.15s;
  }
  .reset-btn:hover{color:var(--text);border-color:var(--muted)}

  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap');
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Packliste</h1>
    <span class="dest-badge">Mallorca</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
  <div class="progress-label" id="plabel">0 von 34 vollständig</div>
</header>

<div class="persons-header">
  <div></div>
  <div class="person-col">Ramiro</div>
  <div class="person-col">Leonel</div>
  <div class="person-col">André</div>
  <div class="person-col">Steffi</div>
  <div></div>
</div>

<div id="list"></div>

<div class="add-section">
  <div class="add-row">
    <input class="add-input" id="new-item" type="text" placeholder="Artikel hinzufügen…" maxlength="60">
    <button class="add-btn" onclick="addItem()">+ Hinzufügen</button>
  </div>
</div>

<div class="footer-actions">
  <button class="reset-btn" onclick="resetAll()">Alles zurücksetzen</button>
</div>

<script>
const BASE_ITEMS=[
  {name:"Badelatschen",count:null},
  {name:"Ersatzschuhe",count:null},
  {name:"Badehose / Bikini",count:null},
  {name:"Jogging Hose",count:1},
  {name:"Shorts",count:2},
  {name:"Jeans",count:1},
  {name:"T-Shirts",count:5},
  {name:"Sweater",count:2},
  {name:"Tücher",count:null},
  {name:"Caps",count:null},
  {name:"Socken",count:7},
  {name:"Unterwäsche",count:7},
  {name:"Schlafanzug",count:1},
  {name:"Regenjacken",count:null},
  {name:"Brille / Sonnenbrille",count:null},
  {name:"Krankenversicherungskarten",count:null},
  {name:"Taschentücher",count:null},
  {name:"Sonnencreme",count:null},
  {name:"Zahnbürste + Zahnpasta",count:null},
  {name:"Deo",count:null},
  {name:"Haarbürste",count:null},
  {name:"Ohrenstäbchen",count:null},
  {name:"Erste-Hilfe-Set",count:null},
  {name:"Nagelpflegeset inkl. Pinzette",count:null},
  {name:"Seife / Shampoo",count:null},
  {name:"Schreibzeug",count:null},
  {name:"Kartenspiel / Spielesammlung",count:null},
  {name:"eBook-Reader",count:null},
  {name:"Wärmflasche",count:null},
  {name:"Waschpulver",count:null},
  {name:"Ladekabel",count:null},
  {name:"Trinkflaschen",count:null},
  {name:"Handtücher",count:null},
  {name:"SP2000 Tasche",count:null}
];

const STATE_KEY="mallorca_pack_v2";

function loadState(){
  try{return JSON.parse(localStorage.getItem(STATE_KEY))||{checks:{},custom:[]};}
  catch(e){return{checks:{},custom:[]};}
}
function saveState(){
  try{localStorage.setItem(STATE_KEY,JSON.stringify(state));}catch(e){}
}

let state=loadState();

function allItems(){
  return [
    ...BASE_ITEMS.map((it,i)=>({...it,id:"b"+i,custom:false})),
    ...(state.custom||[]).map(it=>({...it,custom:true}))
  ];
}

function render(){
  const list=document.getElementById("list");
  list.innerHTML="";
  const items=allItems();
  items.forEach(item=>{
    const checks=state.checks[item.id]||[false,false,false,false];
    const allDone=checks.every(Boolean);
    const row=document.createElement("div");
    row.className="item-row"+(allDone?" all-done":"")+(item.custom?" custom-row":"");

    const nameEl=document.createElement("div");
    nameEl.className="item-name"+(allDone?" done":"");
    nameEl.innerHTML=item.name+(item.count?` <span class="count-badge">×${item.count}</span>`:"");
    row.appendChild(nameEl);

    [0,1,2,3].forEach(p=>{
      const wrap=document.createElement("div");
      wrap.className="cb-wrap";
      const cb=document.createElement("input");
      cb.type="checkbox";
      cb.checked=checks[p]||false;
      cb.addEventListener("change",()=>{
        const c=state.checks[item.id]||[false,false,false,false];
        c[p]=cb.checked;
        state.checks[item.id]=c;
        saveState();
        render();
      });
      wrap.appendChild(cb);
      row.appendChild(wrap);
    });

    if(item.custom){
      const del=document.createElement("button");
      del.className="del-btn";
      del.innerHTML="&#215;";
      del.title="Löschen";
      del.addEventListener("click",()=>{
        state.custom=state.custom.filter(c=>c.id!==item.id);
        delete state.checks[item.id];
        saveState();
        render();
      });
      row.appendChild(del);
    } else {
      const ph=document.createElement("div");
      ph.className="del-btn-placeholder";
      row.appendChild(ph);
    }

    list.appendChild(row);
  });
  updateProgress();
}

function updateProgress(){
  const items=allItems();
  const total=items.length;
  const done=items.filter(it=>{
    const c=state.checks[it.id]||[];
    return c.length===4&&c.every(Boolean);
  }).length;
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById("pbar").style.width=pct+"%";
  document.getElementById("plabel").textContent=done+" von "+total+" vollständig ("+pct+"%)";
}

function addItem(){
  const input=document.getElementById("new-item");
  const val=input.value.trim();
  if(!val)return;
  const id="c"+Date.now();
  if(!state.custom)state.custom=[];
  state.custom.push({name:val,count:null,id});
  saveState();
  input.value="";
  render();
}

document.getElementById("new-item").addEventListener("keydown",e=>{
  if(e.key==="Enter")addItem();
});

function resetAll(){
  if(confirm("Alle Häkchen zurücksetzen?")){
    state.checks={};
    saveState();
    render();
  }
}

render();
</script>
</body>
</html>
